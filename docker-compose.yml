services:
    db:
        image: marketplace-db:latest
        build: ./Database
        container_name: marketplace-db
        restart: unless-stopped
        command:
          - --log-bin-trust-function-creators=1
        environment:
          MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE:     ${MYSQL_DATABASE}
          MYSQL_USER:         ${MYSQL_USER}
          MYSQL_PASSWORD:     ${MYSQL_PASSWORD}
        volumes:
          - ./Database/mysqlData:/var/lib/mysql
        healthcheck:
          test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
          interval: 10s
          timeout: 5s
          retries: 5
        ports:
          - '3306:3306'
    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: pma
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            PMA_ARBITRARY: 1
        restart: unless-stopped
        ports:
            - "8082:80"
        depends_on:
            - db

    rembg:
        image: danielgatis/rembg:2.0.75
        container_name: marketplace-rembg
        command: ["s", "--host", "0.0.0.0", "--port", "7000", "--log_level", "info", "--no-ui"]
        restart: unless-stopped
        ports:
            - '7000:7000'
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7000/api', timeout=5)"
                ]
            interval: 10s
            timeout: 10s
            retries: 24
            start_period: 120s

    backend:
        image: marketplace-backend:latest
        build:
            context: ./Backend
            dockerfile: WebApi/Dockerfile
        container_name: marketplace-backend
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
            rembg:
                condition: service_healthy
        env_file:
            - ./.env
            - ./Backend/WebApi/.env
        environment:
            ASPNETCORE_ENVIRONMENT: Development
            MYSQL_HOST: db
            Rembg__Endpoint: http://rembg:7000/api/remove
        volumes:
            - ./Backend/WebApi/images:/app/Images
        ports:
            - '7192:80'

    frontend:
        build:
            context: ./Frontend/src
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
                NEXT_PUBLIC_MARKETPLACE_NAME: ${NEXT_PUBLIC_MARKETPLACE_NAME}
        image: marketplace-frontend:latest
        container_name: marketplace-frontend
        restart: unless-stopped
        ports:
            - '3000:3000'
        environment:
            NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
            NEXT_PUBLIC_MARKETPLACE_NAME: ${NEXT_PUBLIC_MARKETPLACE_NAME}
            NODE_ENV: production
        depends_on:
            - backend

volumes:
    mysqlData:
